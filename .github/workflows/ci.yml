name: "CI"
on:
  - push
  - pull_request
jobs:
  test-example-problem:
    name: "Test Example Problem"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@v6
      - name: "Install Application with pip"
        run: pip install .[dev]
      - name: "Sync Example Problem Dependencies"
        working-directory: example_problems/number_in_range
        run: uv run pywrangler sync --force
      - name: "Start Example Problem"
        working-directory: example_problems/number_in_range
        run: |
          uv run pywrangler dev --local --port 8788 > /tmp/number-in-range.log 2>&1 &
          echo "$!" > /tmp/number-in-range.pid
          for i in {1..30}; do
            if curl -sS http://127.0.0.1:8788/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/number-in-range.log
          exit 1
      - name: "Run Problem Tester"
        run: |
          python -m algobowl.lib.problem_tester http://127.0.0.1:8788 example_problems/number_in_range/test_data
      - name: "Stop Example Problem"
        if: always()
        run: |
          if [ -f /tmp/number-in-range.pid ]; then
            kill "$(cat /tmp/number-in-range.pid)" || true
          fi
  migration-test:
    name: "Migration Test"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@v6
      - name: "Install Application with pip"
        run: pip install .[dev]
      - name: "Setup App"
        run: gearbox setup-app -c development.ini.sample
      - name: "Run Migration Test"
        run: ./migration_test.sh
  curl-test:
    name: "Smoke Test App with cURL"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@v6
      - name: "Install Application with pip"
        run: pip install .[dev]
      - name: "Setup App"
        run: gearbox setup-app -c development.ini.sample
      - name: "Run cURL test"
        run: |
          gearbox serve -c development.ini.sample --daemon
          sleep 2
          gearbox serve --status
          sleep 2
          curl -f http://127.0.0.1:8080/
          curl -f http://127.0.0.1:8080/competition
          curl -f http://127.0.0.1:8080/competition/archive
          gearbox serve -c development.ini.sample --stop-daemon
  ruff-check:
    name: "Check source format and lint with Ruff"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
      - run: ruff format --check
  build-dist:
    name: "Build Wheels"
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    env:
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@v6
      - name: "Install build dependencies"
        run: pip install --upgrade build wheel setuptools click s3fs
      - name: "Build Problem Server Package"
        run: uv build algobowl-python-problem-server
      - name: "Upload assets to CDN"
        run: ./cdnify.py
      - name: "Build"
        run: python -m build
      - name: "Collect dist artifacts"
        run: |
          mkdir -p dist
          cp algobowl-python-problem-server/dist/* dist/
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
  pypi-publish:
    name: Upload release to PyPI
    needs: build-dist
    runs-on: ubuntu-24.04
    environment:
      name: release
      url: https://pypi.org/p/algobowl
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
    - name: "Download Artifacts"
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
